name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build, vet & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Reads the Go version from go.mod so CI matches local (1.24.5).
          go-version-file: go.mod

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...
